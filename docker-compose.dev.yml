services:
  qdrant-dev:
    image: qdrant/qdrant:latest
    container_name: chat-like-human-qdrant-dev
    restart: unless-stopped
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - ./qdrant_storage_dev:/qdrant/storage:z

  redis-dev:
    image: redis:7-alpine
    container_name: chat-like-human-redis-dev
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --requirepass zxr120713.
    volumes:
      - ./redis_data_dev:/data

  mysql-dev:
    image: mysql:8.0
    container_name: chat-like-human-mysql-dev
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: zxr120713.
      MYSQL_DATABASE: agent_db
      TZ: Asia/Shanghai
    volumes:
      - ./mysql_data_dev:/var/lib/mysql:z
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  mem0-dev:
    image: mem0/mem0-api-server:latest
    container_name: chat-like-human-mem0-dev
    profiles:
      - mem0
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ADMIN_API_KEY: ${MEM0_API_KEY:-}
      OPENAI_API_KEY: ${MEM0_LLM_API_KEY:-}
      HISTORY_DB_PATH: /app/history/history.db
    volumes:
      - ./mem0_history_dev:/app/history:z
    extra_hosts:
      - "host.docker.internal:host-gateway"
